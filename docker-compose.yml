version: "3.9"

services:
  phq9-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: phq9-depression-app:latest
    container_name: phq9-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_DIR=/app/models
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Mount models directory (place best_model.pt and whisper/ here)
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: phq9-network
